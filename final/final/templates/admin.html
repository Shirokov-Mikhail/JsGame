<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Администрирование</title>
  <link rel="stylesheet" href="static/css/tradicii.css">
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="site-logo" href="index.html"><img src="media/img/logo.svg" width="180" height="48" alt=""></a>
      <nav class="main-nav">
        <a href="index.html">На сайт</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:24px 20px 48px;">
    <h1>Панель администратора</h1>

    <section style="margin-bottom:40px;">
      <h2>Пользователи</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Логин</th>
            <th>Имя</th>
            <th>Роль</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>admin</td>
            <td>Администратор</td>
            <td>Администратор</td>
            <td><a href="#">Изменить</a></td>
          </tr>
          <tr>
            <td>user1</td>
            <td>Иван Иванов Иванович</td>
            <td>Пользователь</td>
            <td><a href="#">Изменить</a> · <a href="#">Удалить</a></td>
          </tr>
        </tbody>
      </table>
      <p style="margin-top:16px;"><a class="btn btn--primary btn--sm" href="#">Создать пользователя</a></p>
    </section>

    <section>
      <h2>Народы (справочник)</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Название</th>
            <th>Представитель</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Татары</td>
            <td>rep_tatar</td>
            <td><a href="#">Изменить</a> · <a href="#">Назначить представителя</a></td>
          </tr>
        </tbody>
      </table>
      <form method="post" action="#" class="form-grid" style="max-width:400px;margin-top:20px;">
        <div class="form-row">
          <label for="people_name">Новый народ</label>
          <input type="text" id="people_name" name="name" required>
        </div>
        <button type="submit" class="btn btn--primary btn--sm">Добавить народ</button>
      </form>
    </section>
  </main>
</body>
</html>
