<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Rocket Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen">
        <div class="start-container">
            <h1>Space Rocket</h1>
            <input type="text" id="player-name" placeholder="Введите ваше имя">
            <div class="difficulty">
                <input type="radio" id="easy" name="difficulty" value="easy">
                <label for="easy">Легкий</label>
                <input type="radio" id="medium" name="difficulty" value="medium" checked>
                <label for="medium">Средний</label>
                <input type="radio" id="hard" name="difficulty" value="hard">
                <label for="hard">Сложный</label>
            </div>
            <!-- <button class="start-btn" disabled>Start Game</button> -->
            <button class="start-btn" id="start-btn">Начать игру</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div class="hud">
            <div class="timer" id="timer">Время: 00:00</div>
            <div class="coins" id="coins">Монеты: 0</div>
            <div class="health-bar" id="health-bar">Здоровье: 100%</div>
            <div class="fuel2" id="fuel2">Топливо: 100%</div>
        </div>
        <canvas id="canvas" width="1920" height="1080"></canvas>
        <!-- Objects will be added dynamically -->
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen">
        <div class="pause-container">
            <h2>Пауза</h2>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <div class="game-over-container">
            <h2>Конец игры</h2>
            <table class="leaderboard">
                <thead>
                    <tr>
                        <th>Ранг</th>
                        <th>Никнейм</th>
                        <th>Время</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Leaderboard entries will be added dynamically -->
                </tbody>
            </table>
            <button class="retry-btn">Начать заново</button>
            <button class="menu-btn">В меню</button>
        </div>
    </div>

    <!-- Countdown -->
    <div id="countdown"></div>

    <script type="text/javascript" src="game.js">
        </script>
</body>
</html>
