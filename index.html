<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Батискаф: Океаническая экспедиция</title>
  <link rel="stylesheet" href="media/palette/colors.css">
  <link rel="stylesheet" href="static/css/game.css">
</head>
<body>
  <main id="app">
    <section id="start-screen" class="overlay is-visible" aria-label="Стартовый экран">
      <div class="panel">
        <h1>Океаническая экспедиция</h1>
        <p class="muted">Управляйте батискафом, собирайте кристаллы и избегайте мин.</p>
        <form id="start-form" class="form-grid">
          <label for="player-name">Имя игрока</label>
          <input id="player-name" name="playerName" type="text" minlength="2" maxlength="24" required>

          <label for="difficulty">Уровень сложности</label>
          <select id="difficulty" name="difficulty">
            <option value="easy">Лёгкий</option>
            <option value="medium" selected>Средний</option>
            <option value="hard">Сложный</option>
          </select>

          <!-- По ТЗ кнопка неактивна без имени — включите disabled в своём JS -->
          <button id="start-btn" class="btn" type="button">Начать погружение</button>
        </form>
        <div class="controls-hint">
          <span>WASD / ←↑↓→ — движение</span>
          <span>P — пауза</span>
          <span>E — сонар</span>
        </div>
      </div>
    </section>

    <section id="countdown-screen" class="overlay" aria-label="Обратный отсчёт">
      <div class="countdown-text" id="countdown-text">3</div>
    </section>

    <section id="pause-screen" class="overlay" aria-label="Пауза">
      <div class="panel panel-sm">
        <h2>Пауза</h2>
        <p class="muted">Нажмите P, чтобы продолжить.</p>
      </div>
    </section>

    <section id="result-screen" class="overlay" aria-label="Результаты">
      <div class="panel">
        <h2>Результаты погружения</h2>
        <table class="result-table">
          <tbody>
            <tr><th>Игрок</th><td id="result-name">—</td></tr>
            <tr><th>Время</th><td id="result-time">00:00</td></tr>
            <tr><th>Кристаллы</th><td id="result-crystals">0</td></tr>
          </tbody>
        </table>

        <div class="result-actions">
          <button id="save-result-btn" class="btn" type="button">Сохранить результат</button>
          <button id="retry-btn" class="btn btn-ghost" type="button">Повторить</button>
          <button id="back-btn" class="btn btn-ghost" type="button">На старт</button>
        </div>
        <p id="save-status" class="muted" role="status"></p>
      </div>
    </section>

    <section id="game-screen" aria-label="Игровое поле">
      <header id="hud">
        <div class="hud-item"><span>Таймер</span><strong id="hud-timer">00:00</strong></div>
        <div class="hud-item"><span>Кристаллы</span><strong id="hud-crystals">0</strong></div>
        <div class="hud-item">
          <span>Прочность</span>
          <div class="bar"><div id="hud-hull" class="bar-fill hull" style="width:100%"></div></div>
        </div>
        <div class="hud-item">
          <span>Кислород <strong id="hud-oxygen-text">100%</strong></span>
          <div class="bar"><div id="hud-oxygen" class="bar-fill oxygen" style="width:100%"></div></div>
        </div>
        <div class="hud-item"><span>Сонар</span><strong id="hud-sonar">0</strong></div>
      </header>

      <div id="playfield">

        <canvas id="canvas" width="1920" height="1080" style="border: 1px solid red"></canvas>
      </div>
    </section>
  </main>

<!--   Подключите свой скрипт с игровой логикой (конкурсант): -->
   <script src="game.js" defer></script>
</body>
</html>
