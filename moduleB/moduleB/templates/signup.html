
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация-Моя библиотека</title>
    <link rel="stylesheet" href="../static/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- Страница регистрации -->
    <div class="auth-container" id="register-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-book-open"></i> Регистрация</h1>
                <p>Создайте новый аккаунт</p>
            </div>
            <form class="auth-form" action='signup.php' method='post'>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="Введите ваш email" name='email' >
                    <span class="error-message" style='display: block;'></span>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Введите пароль (минимум 5 символов)" name='password'>
                    <span class="error-message"></span>
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <div class="auth-footer">
                    <p>Уже есть аккаунт? <a href="index.php" id="login-link">Войти</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
