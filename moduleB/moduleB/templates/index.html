
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход-Моя библиотека</title>
    <link rel="stylesheet" href="/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Страница авторизации -->
    <div class="auth-container" id="login-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-book-open"></i> Моя библиотека</h1>
                <p>Войдите в свой аккаунт</p>
            </div>
            <form class="auth-form" action="/auth/" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Введите ваш email" name='email' style="border-color: {{ email_error.0 }}">
                    <span class="error-message" style="display: flex">{{ email_error.1 }}</span>
                </div>
                <!--error класс для вывода ошибок-->
                <div class="form-group error">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите ваш пароль" name='password' style="border: 1px solid {{ password_error.0 }}"><!--#ddd-->
                    <span class="error-message">{{ password_error.1 }}</span>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
                <div class="auth-footer">
                    <p>Ещё нет аккаунта? <a href="/registration/" id="register-link">Зарегистрироваться</a></p>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
