
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книги-Моя библиотека</title>
    <link rel="stylesheet" href="../static/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- Основной интерфейс после авторизации -->
    <div class="app-container" id="app-interface">
        <!-- Шапка -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <h1>Моя библиотека</h1>
                </div>
                <nav class="main-nav">
                    <ul>
                        <li class="active"><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                        <li><a href="/add_new_film/"><i class="fas fa-plus"></i> Добавить книгу</a></li>
                        <li><a href="/auth/" id="logout-btn"><i class="fas fa-sign-out-alt"></i>Выход</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <!-- Основное содержимое -->
        <main class="main-content">
            <div class="container">
                <!-- Панель управления -->
                <div class="control-panel">
                    <form action=" " method="post">
                        <div class="search-box">
                            <input type="text" placeholder="Поиск по названию..." name="search">
                            <button type="submit" class="btn btn-search"><i class="fas fa-search"></i>Найти</button>
                        </div>
                    </form>
                    <div class="filters">
                        <form action=" " class="row g-2" method="post">
                            <select class="form-control" name='search_genre'>
                            <option value="0">Выберите жанр</option>
                            <option value="1">Фантастика</option>
                            <option value="2">Классика</option>
                            <option value="3">Детектив</option>
                            <option value="4">Роман</option>
                            <option value="5">Научная литература</option>
                            <option value="6">Биография</option>
                            </select>
                            <button class="btn btn-primary">Выбрать</button>
                        </form>
                        <form action=" " class="row g-2"  method="post">
                            <select class="form-control" name="alpha">
                                <option value="ASC">По названию (А-Я)</option>
                                <option value="DESC">По названию (Я-А)</option>
                            </select>
                            <button class="btn btn-primary" >Сортировать</button>
                        </form>                        
                    </div>
                </div>
                <!-- Список книг -->
                <div class="books-list">
                   {%  for i in data %}
                     <div class="book-card">
                        <div class="book-cover">
                            <img src="i.6" alt="Обложка книги">
                            <a href="book.html"></a>
                        </div>
                        <div class="book-info">
                            <h3 class="book-title"><a href="book.html"> </a></h3>
                            <p class="book-author">{{ i.2 }}</p>
                            <div class="book-meta">
                                <span class="book-year"><i class="fas fa-calendar-alt">{{ i.4 }}</i>

                            </span>
                                <span class="book-genre"><i class="fas fa-tag">{{i.3}}</i>

                                </span>
                            </div>
                            <div class="book-actions">
                                <a class="btn btn-view"><i class="fas fa-eye"></i>?</a>
                                <a  class="btn btn-edit"><i class="fas fa-edit">Редактировать</i></a>
                                <a class="btn btn-delete"><i class="fas fa-trash">Удалить</i></a>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <!-- Пагинация -->
                <div class="pagination">
                    <a class="btn btn-pagination" href=" "><i class="fas fa-chevron-left"></i></a>
                    <a class="btn btn-pagination active" href=" "></a>
                    <a class="btn btn-pagination" href=" "><i class="fas fa-chevron-right"></i></a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
