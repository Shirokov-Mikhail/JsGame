
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация-Моя библиотека</title>
    <link rel="stylesheet" href="../static/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- Страница регистрации -->
    <div class="auth-container" id="register-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-book-open"></i> Регистрация</h1>
                <p>Создайте новый аккаунт</p>
            </div>
            <form class="auth-form" method='post'>
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Введите ваш email" name='email' style="border-color: {{ email_error.0 }}">
                    <span class="error-message" style="display: flex">{{ email_error.1 }}</span>
                </div>
                <!--error класс для вывода ошибок-->
                <div class="form-group error">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите ваш пароль" name='password' style="border: 1px solid {{ password_error.0 }}"><!--#ddd-->
                    <span class="error-message">{{ password_error.1 }}</span>
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <div class="auth-footer">
                    <p>Уже есть аккаунт? <a href="/" id="login-link">Войти</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
