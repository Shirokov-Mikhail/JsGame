<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление-Моя библиотека</title>
    <link rel="stylesheet" href="../static/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- Основной интерфейс после авторизации -->
    <div class="app-container" id="app-interface">
        <!-- Шапка -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <h1>Моя библиотека</h1>
                </div>
                <nav class="main-nav">
                    <ul>
                        <li class="active"><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                        <li><a href="/add_new_film/"><i class="fas fa-plus"></i> Добавить книгу</a></li>
                        <li><a href="/auth/" id="logout-btn"><i class="fas fa-sign-out-alt"></i>Выход</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <!-- Основное содержимое -->
        <main class="main-content">
            <div class="container">
                <div class="modal-content confirm-content">
                    <div class="modal-header">
                        <h2>Подтверждение удаления</h2>
                    </div>
                    <div class="modal-body">
                        <p>Вы уверены, что хотите удалить эту книгу "Название книги"? Это действие нельзя отменить.</p>
                        <div class="confirm-actions">
                            <a href="/book/{{ id }}" class="btn btn-secondary">Отмена</a>
                            <a href="/delete/{{ id }}" class="btn btn-danger">Удалить</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
